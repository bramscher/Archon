services:
  # Supabase Database (PostgreSQL)
  supabase-db:
    image: postgres:17
    container_name: archon-supabase-db
    ports:
      - "6543:5432"  # Database port 6543 (different from default 5432)
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d
    networks:
      - supabase-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Auth
  supabase-auth:
    image: supabase/gotrue:v2.132.3
    container_name: archon-supabase-auth
    ports:
      - "6999:9999"  # Auth port 6999
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@supabase-db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3737
      GOTRUE_URI_ALLOW_LIST: http://localhost:3737,http://localhost:5173
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: supabase-mail
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: fake_mail_user
      GOTRUE_SMTP_PASS: fake_mail_password
      GOTRUE_SMTP_SENDER_NAME: Supabase
    networks:
      - supabase-network
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-mail:
        condition: service_started

  # Supabase REST API
  supabase-rest:
    image: postgrest/postgrest:v12.0.2
    container_name: archon-supabase-rest
    ports:
      - "6301:3000"  # REST API port 6301
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - supabase-network
    depends_on:
      supabase-db:
        condition: service_healthy

  # Supabase Realtime
  supabase-realtime:
    image: supabase/realtime:v2.25.47
    container_name: archon-supabase-realtime
    ports:
      - "6400:4000"  # Realtime port 6400
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 4000
      JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      SECURE_CHANNELS: "false"
      DB_SSL: "false"
    networks:
      - supabase-network
    depends_on:
      supabase-db:
        condition: service_healthy

  # Supabase Storage
  supabase-storage:
    image: supabase/storage-api:v0.40.4
    container_name: archon-supabase-storage
    ports:
      - "6500:5000"  # Storage port 6500
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      PROJECT_REF: archon-local
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      DATABASE_URL: postgres://postgres:postgres@supabase-db:5432/postgres
      PGOPTIONS: "-c search_path=storage"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - supabase-network
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started

  # Supabase Studio (Dashboard)
  supabase-studio:
    image: supabase/studio:latest
    container_name: archon-supabase-studio
    ports:
      - "6302:3000"  # Studio port 6302
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_NAME: Archon
      DEFAULT_PROJECT_NAME: archon-local
      SUPABASE_URL: http://localhost:6301
      SUPABASE_PUBLIC_URL: http://localhost:6301
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    networks:
      - supabase-network
    depends_on:
      supabase-meta:
        condition: service_started

  # Supabase Meta (Database introspection)
  supabase-meta:
    image: supabase/postgres-meta:v0.68.0
    container_name: archon-supabase-meta
    ports:
      - "6808:8080"  # Meta port 6808
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    networks:
      - supabase-network
    depends_on:
      supabase-db:
        condition: service_healthy

  # Email testing server (Inbucket)
  supabase-mail:
    image: axllent/mailpit:latest
    container_name: archon-supabase-mail
    ports:
      - "6825:8025"  # Mail web interface port 6825
      - "61025:1025"  # SMTP port 61025
    networks:
      - supabase-network

volumes:
  supabase-db-data:
    driver: local
  supabase-storage-data:
    driver: local

networks:
  supabase-network:
    driver: bridge
